<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draco | 深圳大学 </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }

        body {
            background: linear-gradient(135deg, #050a20, #0e1b3d, #11224a);
            background-size: 300% 300%;
            animation: bgMove 32s linear infinite;
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
            position: relative;
        }

        @keyframes bgMove {
            0% {background-position: 0% 50%;}
            100% {background-position: 100% 50%;}
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .header {
            display: flex;
            justify-content: flex-end;
            margin: 60px 0 80px;
            animation: headerShow 1.8s ease forwards;
            opacity: 0;
            transform: translateY(-30px);
        }

        @keyframes headerShow {
            to {opacity: 1; transform: translateY(0);}
        }

        .name-box {
            text-align: right;
            opacity: 0;
            transform: translateY(40px);
            animation: nameFadeUp 1.2s ease-out 0.6s forwards;
        }

        @keyframes nameFadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-name {
            font-size: 48px;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .subTitle {
            font-size: 18px;
            color: #b8d4ff;
            letter-spacing: 2px;
        }

        /* 卡片性能优化核心 */
        .card {
            position: relative;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(7px);
            will-change: transform, opacity;
            border: 1px solid rgba(120, 180, 255, 0.12);
            border-radius: 22px;
            padding: 32px;
            margin: 36px 0;
            opacity: 0;
            transform: scale(0.88);
            transition: all 0.85s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .card.active {
            opacity: 1;
            transform: scale(1);
        }

        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -120%;
            width: 120%;
            height: 100%;
            background: linear-gradient(90deg,transparent,rgba(255, 255, 255, 0.05),transparent);
            transform: skewX(-12deg);
            transition: left 0.85s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 0;
        }

        .card.active::before {
            left: 120%;
        }

        .card h2,
        .card p,
        .card .labList,
        .card .funcBtn {
            position: relative;
            z-index: 1;
        }

        .card:hover {
            transform: scale(1.02);
            box-shadow: 0 16px 40px rgba(54, 136, 255, 0.16);
            border-color: rgba(120, 180, 255, 0.38);
        }

        .card:active {
            transform: scale(0.99);
            box-shadow: 0 10px 25px rgba(54, 136, 255, 0.12);
        }

        .card h2 {
            color: #63b3ff;
            margin-bottom: 18px;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card p {
            line-height: 1.8;
            color: #d0e1ff;
            font-size: 16px;
        }

        .labList {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 22px;
        }

        .labTag {
            padding: 10px 20px;
            background: rgba(54,136,255,0.16);
            border-radius: 50px;
            border: 1px solid rgba(99, 179, 255, 0.28);
            transition: all 0.25s ease;
            cursor: pointer;
            will-change: transform;
        }

        .labTag:hover {
            background: #3688ff;
            transform: translateY(-5px) scale(1.08);
            box-shadow: 0 6px 16px #3688ff40;
        }

        .labTag:active {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 3px 10px #3688ff30;
        }

        .funcBtn {
            margin-top: 24px;
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(90deg, #2470e0, #4898ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            will-change: transform;
        }

        .funcBtn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 20px #3688ff55;
        }

        .funcBtn:active {
            transform: scale(1.02);
            box-shadow: 0 4px 12px #3688ff35;
        }

        footer {
            text-align: center;
            margin-top: 100px;
            padding: 20px;
            color: #88a8d8;
            animation: fadeBottom 2s ease 1s forwards;
            opacity: 0;
        }

        @keyframes fadeBottom {
            to {opacity: 1;}
        }

        /* 弹窗轻量化优化 */
        .tip-modal {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translate(-50%, -40px);
            background: rgba(15, 25, 50, 0.96);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(99, 179, 255, 0.35);
            border-radius: 14px;
            padding: 18px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 9999;
            opacity: 0;
            box-shadow: 0 8px 24px rgba(54, 136, 255, 0.2);
            animation: modalIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            will-change: transform, opacity;
        }
        @keyframes modalIn {
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        .tip-modal.fade-out {
            animation: modalOut 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes modalOut {
            to {
                opacity: 0;
                transform: translate(-50%, -40px);
            }
        }

        .tip-text {
            color: #fff;
            font-size: 15px;
        }

        .tip-close {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid #63b3ff;
            color: #63b3ff;
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .tip-close:hover {
            background: #63b3ff;
            color: #000;
        }

        @media (max-width:768px){
            .header{
                justify-content: center;
            }
            .name-box{
                text-align:center;
            }
            .main-name{
                font-size:32px;
            }
            .tip-modal {
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="name-box">
                <h1 class="main-name">Draco</h1>
                <p class="subTitle">深圳大学 | 实验报告收纳个人主页</p>
            </div>
        </div>

        <div class="card">
            <h2>👤 个人简介</h2>
            <p>
                我是Draco，现就读于深圳大学。
            </p>
        </div>

        <div class="card">
            <h2>📂 实验报告分类仓库</h2>
            <p>点击对应科目标签，自动跳转下载该科全套实验文件夹压缩包：</p>
            <div class="labList">
                <div class="labTag" data-link="link1">大学计算机实验</div>
                <div class="labTag" data-link="link2">大学物理实验</div>
                <div class="labTag" data-link="link3">计算机与系统概论实验</div>
                <div class="labTag" data-link="link4">数字电路实验</div>
            </div>
            <button class="funcBtn" onclick="openLabStorage()">进入完整报告仓库</button>
        </div>

        <footer>
            Draco · 深圳大学 | 实验报告专用收纳主页 © 2026
        </footer>
    </div>

    <script>
        const reportLinks = {
            link1: "大学计算机实验文件夹加速下载链接",
            link2: "大学物理实验文件夹加速下载链接",
            link3: "计算机与系统概论实验文件夹加速下载链接",
            link4: "数字电路实验文件夹加速下载链接"
        };

        function showTip(msg) {
            const oldModal = document.querySelector(".tip-modal");
            if(oldModal) oldModal.remove();

            const modal = document.createElement("div");
            modal.className = "tip-modal";
            modal.innerHTML = `
                <span class="tip-text">${msg}</span>
                <span class="tip-close">×</span>
            `;
            document.body.appendChild(modal);

            modal.querySelector(".tip-close").onclick = () => {
                modal.classList.add("fade-out");
                setTimeout(() => modal.remove(), 350);
            };

            setTimeout(() => {
                modal.classList.add("fade-out");
                setTimeout(() => modal.remove(), 350);
            }, 2000);
        }

        const cards = document.querySelectorAll(".card");
        const observe = new IntersectionObserver((items) => {
            items.forEach(item => {
                if(item.isIntersecting) item.target.classList.add("active");
            });
        }, { threshold: 0.15 });

        cards.forEach(c => observe.observe(c));

        function openLabStorage(){
            showTip("完整报告仓库暂未上传资料，敬请等待更新");
        }

        document.querySelectorAll(".labTag").forEach(tag => {
            tag.onclick = function(){
                const key = this.getAttribute("data-link");
                const url = reportLinks[key];

                if(url && !url.includes("文件夹加速下载链接")){
                    window.open(url, "_blank");
                }else{
                    showTip(`${this.innerText}：暂未上传实验资料，敬请等待更新`);
                }
            };
        });
    </script>
</body>
</html>
