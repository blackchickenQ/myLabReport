<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draco | 深圳大学 实验报告收纳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #050a20, #0e1b3d, #11224a);
            background-size: 300% 300%;
            animation: bgMove 32s linear infinite;
            min-height: 100vh;
            overflow-x: hidden;
            color: #fff;
            position: relative;
        }
        @keyframes bgMove {
            0% {background-position: 0% 50%;}
            100% {background-position: 100% 50%;}
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        .header {
            display: flex;
            justify-content: flex-end;
            margin: 60px 0 80px;
            animation: headerShow 1.8s ease forwards;
            opacity: 0;
            transform: translateY(-30px);
        }
        @keyframes headerShow {
            to {opacity: 1; transform: translateY(0);}
        }
        .name-box {
            text-align: right;
            opacity: 0;
            transform: translateY(40px);
            animation: nameFadeUp 1.2s ease-out 0.6s forwards;
        }
        @keyframes nameFadeUp {
            to {opacity: 1; transform: translateY(0);}
        }
        .main-name {
            font-size: 48px;
            margin-bottom: 12px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(99, 179, 255, 0.3);
        }
        .subTitle {
            font-size: 18px;
            color: #b8d4ff;
            letter-spacing: 2px;
        }
        .card {
            position: relative;
            overflow: hidden;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(7px);
            will-change: transform, opacity;
            border: 1px solid rgba(120, 180, 255, 0.12);
            border-radius: 22px;
            padding: 32px;
            margin: 36px 0;
            opacity: 0;
            transform: scale(0.88);
            transition: all 0.85s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card.active {
            opacity: 1;
            transform: scale(1);
        }
        .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -120%;
            width: 120%;
            height: 100%;
            background: linear-gradient(90deg,transparent,rgba(255, 255, 255, 0.05),transparent);
            transform: skewX(-12deg);
            transition: left 0.85s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 0;
        }
        .card.active::before {
            left: 120%;
        }
        .card h2,
        .card p,
        .card .labList,
        .card .funcBtn,
        .card .empty-tip {
            position: relative;
            z-index: 1;
        }
        .card:hover {
            transform: scale(1.02);
            box-shadow: 0 16px 40px rgba(54, 136, 255, 0.16);
            border-color: rgba(120, 180, 255, 0.38);
        }
        .card:active {
            transform: scale(0.99);
            box-shadow: 0 10px 25px rgba(54, 136, 255, 0.12);
        }
        .card h2 {
            color: #63b3ff;
            margin-bottom: 18px;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card p {
            line-height: 1.8;
            color: #d0e1ff;
            font-size: 16px;
        }
        .empty-tip {
            color: #88a8d8;
            font-size: 14px;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 8;
        }
        .labList {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 22px;
        }
        .labTag {
            padding: 10px 20px;
            background: rgba(54,136,255,0.16);
            border-radius: 50px;
            border: 1px solid rgba(99, 179, 255, 0.28);
            transition: all 0.25s ease;
            cursor: pointer;
            will-change: transform;
            position: relative;
            overflow: hidden;
        }
        .labTag::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }
        .labTag:active::after {
            width: 200px;
            height: 200px;
            opacity: 0;
        }
        .labTag:hover {
            background: #3688ff;
            transform: translateY(-5px) scale(1.08);
            box-shadow: 0 6px 16px #3688ff40;
        }
        .labTag:active {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 3px 10px #3688ff30;
        }
        .funcBtn {
            margin-top: 24px;
            padding: 12px 32px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(90deg, #2470e0, #4898ff);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            will-change: transform;
            position: relative;
            overflow: hidden;
        }
        .funcBtn.loading {
            pointer-events: none;
            color: transparent;
        }
        .funcBtn.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }
        .funcBtn:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 20px #3688ff55;
        }
        .funcBtn:active {
            transform: scale(1.02);
            box-shadow: 0 4px 12px #3688ff35;
        }
        footer {
            text-align: center;
            margin-top: 100px;
            padding: 20px;
            color: #88a8d8;
            animation: fadeBottom 2s ease 1s forwards;
            opacity: 0;
        }
        @keyframes fadeBottom {
            to {opacity: 1;}
        }
        /* 全局提示弹窗 */
        .tip-modal {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translate(-50%, -40px);
            background: rgba(15, 25, 50, 0.96);
            backdrop-filter: blur(6px);
            border: 1px solid rgba(99, 179, 255, 0.35);
            border-radius: 14px;
            padding: 18px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 9999;
            opacity: 0;
            box-shadow: 0 8px 24px rgba(54, 136, 255, 0.2);
            animation: modalIn 0.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            will-change: transform;
            max-width: 90%;
        }
        @keyframes modalIn {
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        .tip-modal.fade-out {
            animation: modalOut 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes modalOut {
            to {
                opacity: 0;
                transform: translate(-50%, -40px);
            }
        }
        .tip-text {
            color: #fff;
            font-size: 15px;
            line-height: 1.4;
        }
        .tip-close {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 1px solid #63b3ff;
            color: #63b3ff;
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .tip-close:hover {
            background: #63b3ff;
            color: #000;
        }

        /* 大学物理弹窗：修复重复点击bug */
        .physics-popup-wrap {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: rgba(0,0,0,0.65);
            z-index: 9998;
            /* 不用display:none，用透明度+点击拦截 */
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .physics-popup-wrap.show {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }
        .physics-popup {
            background: #0e1b3d;
            border: 1px solid #63b3ff50;
            border-radius: 18px;
            padding: 28px;
            max-width: 720px;
            width: 100%;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        .physics-popup-wrap.show .physics-popup {
            transform: scale(1);
        }
        .popup-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .popup-head h3 {
            color: #63b3ff;
            font-size: 22px;
        }
        /* 关闭按钮hover+按压回弹 */
        .popup-close {
            width: 30px;
            height: 30px;
            border: 1px solid #63b3ff;
            border-radius: 50%;
            display: grid;
            place-items: center;
            color: #63b3ff;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .popup-close:hover {
            background: #63b3ff;
            color: #000;
            transform: scale(1.1);
        }
        .popup-close:active {
            transform: scale(0.9);
        }
        .physics-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .physics-item {
            padding: 9px 16px;
            border: 1px solid #63b3ff33;
            border-radius: 30px;
            background: rgba(99,179,255,0.08);
            cursor: pointer;
            transition: 0.2s;
        }
        .physics-item:hover {
            background: #3688ff;
        }
        @media (max-width:768px){
            .header{
                justify-content: center;
                margin: 40px 0 60px;
            }
            .name-box{
                text-align:center;
            }
            .main-name{
                font-size:32px;
            }
            .subTitle {
                font-size: 16px;
                letter-spacing: 1px;
            }
            .card {
                padding: 24px;
                margin: 24px 0;
            }
            .card h2 {
                font-size: 20px;
            }
            .labTag {
                padding: 8px 16px;
                font-size: 14px;
            }
            .funcBtn {
                width: 100%;
                padding: 12px 0;
            }
            .physics-popup {
                padding: 20px;
            }
        }
        @media (max-width:480px) {
            .main-name {
                font-size: 28px;
            }
            .labList {
                gap: 10px;
            }
            .tip-modal {
                padding: 14px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="name-box">
                <h1 class="main-name">Draco</h1>
                <p class="subTitle">深圳大学 | 实验报告收纳个人主页</p>
            </div>
        </div>
        <div class="card">
            <h2>👤 个人简介</h2>
            <p>我是Draco，现就读于深圳大学，本页面用于收纳、分享各科实验报告，方便自己和同学查阅下载。</p>
        </div>
        <div class="card">
            <h2>📂 实验报告分类仓库</h2>
            <p>点击对应科目查看实验目录：</p>
            <div class="labList">
                <div class="labTag" id="openPhysicsBtn">大学物理实验</div>
                <div class="labTag" data-link="link11">计算机与系统概论实验</div>
                <div class="labTag" data-link="link13">数字电路实验</div>
                <div class="labTag" data-link="link12">大学计算机实验</div>
            </div>
            <div class="empty-tip">💡 点击大学物理可展开细分实验弹窗</div>
            <button class="funcBtn" onclick="openLabStorage()">进入完整报告仓库</button>
        </div>
        <footer>
            Draco · 深圳大学 | 实验报告专用收纳主页 © 2026
        </footer>
    </div>

    <!-- 大学物理细分弹窗 -->
    <div class="physics-popup-wrap" id="physicsPopup">
        <div class="physics-popup">
            <div class="popup-head">
                <h3>大学物理细分实验</h3>
                <span class="popup-close" id="closePhysicsPopup">×</span>
            </div>
            <div class="physics-list">
                <div class="physics-item" data-phys="p1">薄透镜实验</div>
                <div class="physics-item" data-phys="p2">磁特性综合实验</div>
                <div class="physics-item" data-phys="p3">等厚干涉</div>
                <div class="physics-item" data-phys="p4">电子秤的设计</div>
                <div class="physics-item" data-phys="p5">多普勒效应测声速</div>
                <div class="physics-item" data-phys="p6">费米达拉克分布</div>
                <div class="physics-item" data-phys="p7">光敏电阻特性研究</div>
                <div class="physics-item" data-phys="p8">基于multisim的电源设计</div>
                <div class="physics-item" data-phys="p9">杨氏模量的测量</div>
                <div class="physics-item" data-phys="p10">准稳态法测比热导热系数</div>
            </div>
        </div>
    </div>

    <script>
        // 物理细分实验链接（保留你原始tree链接）
        const physicsLinks = {
            p1: "https://github.com/blackchickenQ/myLabReport/tree/main/薄透镜实验",
            p2: "https://github.com/blackchickenQ/myLabReport/tree/main/磁特性综合实验",
            p3: "https://github.com/blackchickenQ/myLabReport/tree/main/等厚干涉",
            p4: "https://github.com/blackchickenQ/myLabReport/tree/main/电子秤的设计",
            p5: "https://github.com/blackchickenQ/myLabReport/tree/main/多普勒效应测声速",
            p6: "https://github.com/blackchickenQ/myLabReport/tree/main/费米达拉克分布",
            p7: "https://github.com/blackchickenQ/myLabReport/tree/main/光敏电阻特性研究",
            p8: "https://github.com/blackchickenQ/myLabReport/tree/main/基于multisim的电源设计",
            p9: "https://github.com/blackchickenQ/myLabReport/tree/main/杨氏模量的测量",
            p10: "https://github.com/blackchickenQ/myLabReport/tree/main/准稳态法测比热导热系数"
        };
        // 其余三科链接
        const reportLinks = {
            link11: "", // 计算机与系统概论
            link12: "", // 大学计算机
            link13: ""  // 数字电路
        };

        // 弹窗提示
        function showTip(msg) {
            const oldModal = document.querySelector(".tip-modal");
            if(oldModal) oldModal.remove();
            const modal = document.createElement("div");
            modal.className = "tip-modal";
            modal.innerHTML = `
                <span class="tip-text">${msg}</span>
                <span class="tip-close">×</span>
            `;
            document.body.appendChild(modal);
            modal.querySelector(".tip-close").onclick = () => {
                modal.classList.add("fade-out");
                setTimeout(() => modal.remove(), 350);
            };
            setTimeout(() => {
                if(!modal.classList.contains("fade-out")) {
                    modal.classList.add("fade-out");
                    setTimeout(() => modal.remove(), 350);
                }
            }, 3000);
        }

        // 卡片滚动动画
        const cards = document.querySelectorAll(".card");
        const observe = new IntersectionObserver((items) => {
            items.forEach(item => {
                if(item.isIntersecting) {
                    item.target.classList.add("active");
                    observe.unobserve(item.target);
                }
            });
        }, { threshold: 0.15 });
        cards.forEach(c => observe.observe(c));

        // 仓库按钮
        function openLabStorage(){
            const btn = document.querySelector(".funcBtn");
            btn.classList.add("loading");
            setTimeout(() => {
                btn.classList.remove("loading");
                showTip("完整汇总仓库正在整理，敬请等待更新");
            }, 800);
        }

        const popupWrap = document.getElementById("physicsPopup");
        const openBtn = document.getElementById("openPhysicsBtn");
        const closeBtn = document.getElementById("closePhysicsPopup");

        // 打开弹窗：直接加show类，无延时
        openBtn.onclick = () => {
            popupWrap.classList.add("show");
        };
        // 关闭弹窗：直接移除show，无延时display操作
        function closePopup() {
            popupWrap.classList.remove("show");
        }
        closeBtn.onclick = closePopup;
        popupWrap.onclick = (e) => {
            if(e.target === popupWrap) closePopup();
        };

        // 弹窗内10个实验点击跳转
        document.querySelectorAll(".physics-item").forEach(item => {
            item.onclick = function(){
                const key = this.getAttribute("data-phys");
                const url = physicsLinks[key];
                window.open(url, "_blank");
                showTip(`正在打开：${this.innerText} 仓库页面`);
            }
        });

        // 外层三个科目点击逻辑
        document.querySelectorAll(".labTag[data-link]").forEach(tag => {
            tag.onclick = function(){
                const key = this.getAttribute("data-link");
                const url = reportLinks[key];
                if(url && url.trim() !== ""){
                    window.open(url, "_blank");
                    showTip(`正在打开：${this.innerText} 仓库页面`);
                }else{
                    showTip(`${this.innerText}：暂未上传实验资料，等待更新`);
                }
            };
        });
    </script>
</body>
</html>
